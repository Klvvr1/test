<!doctype html>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <meta name="description" content="Discover our team of innovative digital experts. We specialize in Web Development, UI/UX Design, and Cloud Architecture." />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Outfit", "sans-serif"],
            cairo: ["Cairo", "sans-serif"],
          },
          colors: {
            brand: {
              dark: "#0f172a", // Slate 900
              primary: "#3b82f6", // Blue 500
              accent: "#8b5cf6", // Violet 500
            },
          },
          transitionTimingFunction: {
            "out-expo": "cubic-bezier(0.19, 1, 0.22, 1)",
          },
        },
      },
    };
  </script>
  <style>
    /* Custom Styles for Utilities not in Tailwind by default */
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Flip Card Animation */
    .perspective-1000 {
      perspective: 1000px;
    }

    .flip-card-inner {
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flip-card:hover .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    .flip-card-back {
      transform: rotateY(180deg);
    }

    /* Hide scrollbar for clean UI */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Staggered Animation Logic */
    .slide-content-item {
      opacity: 0;
      transform: translateY(20px);
      transition:
        opacity 0.6s ease-out,
        transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .active-slide .slide-content-item {
      opacity: 1;
      transform: translateY(0);
    }

    /* Stagger Delays */
    .active-slide .delay-100 {
      transition-delay: 100ms;
    }

    .active-slide .delay-200 {
      transition-delay: 200ms;
    }

    .active-slide .delay-300 {
      transition-delay: 300ms;
    }

    .active-slide .delay-400 {
      transition-delay: 400ms;
    }

    .active-slide .delay-500 {
      transition-delay: 500ms;
    }

    /* Navigation Button Hover Effect */
    .nav-btn:hover .arrow-icon {
      transform: scale(1.2);
    }

    /* Floating Glow Animation */
    @keyframes floating {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(2%, 5%) scale(1.05); }
      66% { transform: translate(-3%, -2%) scale(0.95); }
    }

    .animate-float {
      animation: floating 8s ease-in-out infinite;
    }

    /* Scroll Progress Bar */
    #scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 4px;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      z-index: 100;
      transition: width 0.1s ease-out;
    }
  </style>
</head>

<body

  <!-- JavaScript Logic -->
  <script>
    // Team Data
    // Data Persistence Handlers
    const STORAGE_KEY = 'portfolio_data_v1';
    
    function saveToStorage() {
      const data = {
        teamMembers,
        welcomeData,
        servicesData
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadFromStorage() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const data = JSON.parse(saved);
          if (data.teamMembers) teamMembers.splice(0, teamMembers.length, ...data.teamMembers);
          if (data.welcomeData) Object.assign(welcomeData, data.welcomeData);
          if (data.servicesData) servicesData.splice(0, servicesData.length, ...data.servicesData);
        } catch (e) {
          console.error("Failed to load data from storage:", e);
        }
      }
    }

    // Initial Data (Default values)
    const teamMembers = [
      {
        name: "Mohammed Hashim",

        skills: ["Leadership", "Project Management", "System Architecture", "React/Node"],

        social: ["twitter", "linkedin", "github"],
        image: "./Team_Images/Leader_Image-removebg-preview.png",
      },
      {
        name: "Ahmed Albtati",
        nameAr: "أحمد البطاطي",
        role: "Team Member",
        roleAr: "عضو الفريق",
        bio: "Creative frontend developer focused on crafting immersive user experiences. Specialist in responsive design and accessibility.",
        bioAr: "مطور واجهات أمامية مبدع يركز على صياغة تجارب مستخدم غامرة. متخصص في التصميم المتجاوب وإمكانية الوصول.",
        skills: ["Frontend Dev", "UI/UX Design", "Three.js", "Accessibility"],
        skillsAr: ["تطوير الواجهات", "تصميم UI/UX", "Three.js", "إمكانية الوصول"],
        social: ["linkedin", "dribbble"],
        image: "https://ui-avatars.com/api/?name=Ahmed+Albtati&background=8b5cf6&color=fff&size=512&font-size=0.33",
      },
      {
        name: "Khaled Bin Mahfouz",
        nameAr: "خالد بن محفوظ",
        role: "Team Member",
        roleAr: "عضو الفريق",
        bio: "Detail-oriented backend engineer ensuring robust and scalable server-side operations. Loves database optimization and cloud infrastructure.",
        bioAr: "مهندس واجهات خلفية دقيق يضمن عمليات خادم قوية وقابلة للتطوير. محب لتحسين قواعد البيانات والبنية التحتية السحابية.",
        image: "https://ui-avatars.com/api/?name=Khaled+Bin+Mahfouz&background=10b981&color=fff&size=512&font-size=0.33",
      },
      {
        name: "Khallad Ghanem",
        nameAr: "خلاد غانم",
        role: "Team Member",
        roleAr: "عضو الفريق",
        bio: "Full-stack developer with a knack for solving complex algorithmic problems. Drives the technical core of our applications.",
        bioAr: "مطور شامل لديه موهبة في حل المشكلات الخوارزمية المعقدة. يقود النواة التقنية لتطبيقاتنا.",
        skills: ["Full Stack", "Algorithms", "DevOps", "Java"],
        skillsAr: ["تطوير شامل", "الخوارزميات", "DevOps", "Java"],
        social: ["github", "twitter"],
        image: "./Team_Images/Khallad_Image-removebg-preview.png",
      },
    ];

    // State & Config
    let currentIndex = 0;
    let currentLang = 'en';
    let isEditMode = false;
    const totalSlides = teamMembers.length;

    // DOM Elements
    const track = document.getElementById("carousel-track");
    const paginationContainer = document.getElementById("pagination");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const langBtn = document.getElementById("lang-btn");

    // Toggle Language
    function toggleLanguage() {
      currentLang = currentLang === 'en' ? 'ar' : 'en';

      // Update Document Attributes
      document.documentElement.lang = currentLang;
      document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

      // Update Font & Texts
      const editBtnText = document.getElementById('edit-mode-text');

      // Footer texts
      const footerCopy = document.getElementById('footer-copy');
      const footerPrivacy = document.getElementById('footer-privacy');
      const footerTerms = document.getElementById('footer-terms');

      if (currentLang === 'ar') {
        document.body.classList.remove('font-sans');
        document.body.classList.add('font-cairo');
        langBtn.innerText = "English";
        editBtnText.innerText = isEditMode ? 'إيقاف التعديل' : 'تعديل';

        if (footerCopy) footerCopy.innerHTML = '&copy; 2026 محفظة الفريق. جميع الحقوق محفوظة.';
        if (footerPrivacy) footerPrivacy.innerText = 'سياسة الخصوصية';
        if (footerTerms) footerTerms.innerText = 'شروط الخدمة';
      } else {
        document.body.classList.add('font-sans');
        document.body.classList.remove('font-cairo');
        langBtn.innerText = "العربية";
        editBtnText.innerText = isEditMode ? 'Stop Edit' : 'Edit';

        if (footerCopy) footerCopy.innerHTML = '&copy; 2026 Team Portfolio. All rights reserved.';
        if (footerPrivacy) footerPrivacy.innerText = 'Privacy Policy';
        if (footerTerms) footerTerms.innerText = 'Terms of Service';
      }

      // Re-render content
      if (typeof renderWelcome === 'function') renderWelcome();
      renderSlides();
      renderServices();

      // Restore position and active state
      goToSlide(currentIndex);
    }

    // Toggle Edit Mode
    function toggleEditMode() {
      isEditMode = !isEditMode;
      const editBtnText = document.getElementById('edit-mode-text');
      const editBtn = document.getElementById('edit-mode-btn');

      if (isEditMode) {
        editBtnText.innerText = currentLang === 'ar' ? 'إيقاف التعديل' : 'Stop Edit';
        editBtn.classList.add('ring-2', 'ring-brand-primary', 'border-brand-primary');
        editBtn.classList.remove('border-white/20');
      } else {
        editBtnText.innerText = currentLang === 'ar' ? 'تعديل' : 'Edit';
        editBtn.classList.remove('ring-2', 'ring-brand-primary', 'border-brand-primary');
        editBtn.classList.add('border-white/20');
      }

      if (typeof renderWelcome === 'function') renderWelcome();
      renderSlides();
      renderServices();
      goToSlide(currentIndex);
    }

    // Welcome Section Data & Logic
    const welcomeData = {
      title: "Welcome to Our Hub",
      titleAr: "مرحباً بكم في مركزنا",
      desc: "Discover a collective of innovative minds dedicated to crafting exceptional digital experiences. Explore our team, our work, and the services we offer.",
      descAr: "اكتشف مجموعة من العقول المبتكرة المكرسة لصياغة تجارب رقمية استثنائية. استكشف فريقنا وأعمالنا والخدمات التي نقدمها.",
      btn: "Meet The Team",
      btnAr: "تعرف على الفريق"
    };

    // Load data from storage right after defining default values
    loadFromStorage();

    function renderWelcome() {
      const welcomeContainer = document.getElementById("welcome-content");
      if (!welcomeContainer) return;

      const isRTL = currentLang === 'ar';
      const titleText = isRTL ? welcomeData.titleAr : welcomeData.title;
      const descText = isRTL ? welcomeData.descAr : welcomeData.desc;
      const btnText = isRTL ? welcomeData.btnAr : welcomeData.btn;

      welcomeContainer.innerHTML = `
        <h1 class="text-5xl md:text-7xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-primary to-brand-accent drop-shadow-sm transition-colors ${isEditMode ? 'hover:bg-black/5 dark:hover:bg-white/5 cursor-text focus:outline-none focus:ring-2 focus:ring-brand-primary rounded p-2' : ''}"
            ${isEditMode ? 'contenteditable="true"' : ''}
            onblur="updateWelcomeTitle(this.innerText)">
          ${titleText}
        </h1>
        
        <p class="text-xl md:text-2xl text-slate-600 dark:text-slate-300 leading-relaxed max-w-2xl mx-auto transition-colors ${isEditMode ? 'cursor-text hover:bg-black/5 dark:hover:bg-white/5 focus:outline-none focus:ring-2 focus:ring-brand-primary rounded p-2' : ''}"
            ${isEditMode ? 'contenteditable="true"' : ''}
            onblur="updateWelcomeDesc(this.innerText)">
          ${descText}
        </p>
        
        <div class="pt-8">
          <button onclick="if(!isEditMode) document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' });" class="px-8 py-4 bg-brand-primary hover:bg-brand-primary/90 text-white rounded-full font-bold text-lg shadow-lg hover:shadow-brand-primary/50 transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-primary dark:focus:ring-offset-brand-dark flex items-center gap-3 mx-auto ${!isEditMode ? 'hover:-translate-y-1' : ''}">
            <span class="${isEditMode ? 'cursor-text focus:outline-none focus:ring-1 focus:ring-white/50 rounded px-2' : ''}"
                  ${isEditMode ? 'contenteditable="true" onblur="updateWelcomeBtn(this.innerText)"' : ''}>
              ${btnText}
            </span>
            <svg class="w-5 h-5 ${!isEditMode ? 'animate-bounce' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
          </button>
        </div>
      `;
    }

    function updateWelcomeTitle(text) {
      if (currentLang === 'ar') welcomeData.titleAr = text.trim();
      else welcomeData.title = text.trim();
      saveToStorage();
    }

    function updateWelcomeDesc(text) {
      if (currentLang === 'ar') welcomeData.descAr = text.trim();
      else welcomeData.desc = text.trim();
      saveToStorage();
    }

    function updateWelcomeBtn(text) {
      if (currentLang === 'ar') welcomeData.btnAr = text.trim();
      else welcomeData.btn = text.trim();
      saveToStorage();
    }

    // Render Slides
    function renderSlides() {
      track.innerHTML = ""; // Clear existing
      teamMembers.forEach((member, index) => {
        const slide = document.createElement("article");
        slide.className = `min-w-full h-full flex flex-col md:flex-row items-center justify-center p-6 md:p-20 gap-8 md:gap-16 opacity-100 transition-opacity duration-300 slide-item`;
        slide.setAttribute("aria-hidden", index !== 0);
        slide.dataset.index = index;

        // Localized Data
        const name = currentLang === 'ar' ? member.nameAr : member.name;
        const role = currentLang === 'ar' ? member.roleAr : member.role;
        const bio = currentLang === 'ar' ? member.bioAr : member.bio;
        const skills = currentLang === 'ar' ? member.skillsAr : member.skills;
        const isRTL = currentLang === 'ar';

        // For layout: In RTL mode, flex-row (no reverse) puts first child on Right.
        // [Image, Text] -> Image Right, Text Left.
        // This is usually correct.
        // Text Alignment: need md:text-right or md:text-start. 
        // Item alignment: md:items-start in Flex follows direction (Right in RTL).

        slide.innerHTML = `
                    <!-- Pop-out Image Section -->
                    <div class="relative w-56 h-72 md:w-72 md:h-96 shrink-0 flex items-end justify-center slide-content-item delay-100 group">
                        
                        <!-- Glow -->
                        <div class="absolute bottom-0 w-full aspect-square bg-brand-primary/30 rounded-full blur-3xl opacity-50 animate-pulse"></div>
                        
                        <!-- Circle Background -->
                        <div class="absolute bottom-0 w-full aspect-square rounded-full border-4 border-slate-200 dark:border-white/10 bg-gradient-to-b from-slate-100 to-slate-200 dark:from-slate-700 dark:to-slate-900 shadow-xl dark:shadow-2xl group-hover:scale-105 transition-transform duration-500 ease-out"></div>

                        <!-- Image -->
                        <img 
                            src="${member.image}" 
                            alt="${name}" 
                            class="relative z-10 w-full h-[120%] object-cover object-top rounded-b-full drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] group-hover:scale-105 transition-transform duration-500 ease-out origin-bottom"
                        >
                        
                        <!-- Badge/Counter -->
                        <div class="absolute bottom-4 ${isRTL ? 'left-4' : 'right-4'} z-20 bg-white/80 dark:bg-white/10 backdrop-blur-md border border-white/40 dark:border-white/20 p-2 rounded-xl text-xs font-mono text-brand-primary font-bold shadow-sm dark:shadow-none">
                            ${index + 1} / ${totalSlides}
                        </div>
                    </div>

                    <!-- Text Section -->
                    <div class="flex flex-col items-center md:items-start text-center ${isRTL ? 'md:text-right' : 'md:text-left'} max-w-2xl space-y-6">
                        
                        <!-- Role Badge -->
                        <span class="inline-block px-4 py-1.5 rounded-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-sm font-semibold tracking-wide uppercase text-brand-primary slide-content-item delay-200 ${isEditMode ? 'hover:bg-black/10 dark:hover:bg-white/10 focus:outline-none focus:ring-1 focus:ring-brand-primary transition-colors cursor-text' : 'cursor-default'}"
                              ${isEditMode ? 'contenteditable="true"' : ''}
                              onblur="updateMemberRole(${index}, this.innerText)"
                              title="${isEditMode ? (isRTL ? 'انقر لتعديل الدور' : 'Click to edit role') : ''}">
                            ${role}
                        </span>

                        <!-- Name -->
                        <h1 class="text-4xl md:text-6xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-700 dark:from-white dark:to-white/60 slide-content-item delay-300">
                            ${name}
                        </h1>

                        <!-- Bio -->
                        <p class="text-lg text-slate-600 dark:text-slate-400 leading-relaxed slide-content-item delay-400 ${isEditMode ? 'hover:bg-black/5 dark:hover:bg-white/5 focus:outline-none focus:ring-1 focus:ring-brand-primary rounded transition-all cursor-text p-1 -mx-1' : 'cursor-default'}"
                           ${isEditMode ? 'contenteditable="true"' : ''}
                           onblur="updateMemberBio(${index}, this.innerText)"
                           title="${isEditMode ? (isRTL ? 'انقر لتعديل النبذة' : 'Click to edit bio') : ''}">
                            ${bio}
                        </p>

                        <!-- Skills -->
                        <div class="flex flex-wrap justify-center ${isRTL ? 'md:justify-start' : 'md:justify-start'} gap-2 slide-content-item delay-500">
                            ${skills.map((skill, skillIdx) => `
                                <span class="px-3 py-1 bg-slate-100 dark:bg-slate-800/50 rounded-lg text-sm text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-slate-700/50 transition-colors ${isEditMode ? 'hover:bg-brand-primary/10 dark:hover:bg-brand-primary/20 hover:text-brand-primary dark:hover:text-brand-primary focus:outline-none focus:ring-1 focus:ring-brand-primary cursor-text' : 'hover:bg-brand-primary/10 dark:hover:bg-brand-primary/20 hover:text-brand-primary dark:hover:text-brand-primary cursor-default'}"
                                      ${isEditMode ? 'contenteditable="true"' : ''}
                                      onblur="updateMemberSkill(${index}, ${skillIdx}, this.innerText)"
                                      title="${isEditMode ? (isRTL ? 'انقر لتعديل المهارة' : 'Click to edit skill') : ''}">
                                    ${skill}
                                </span>
                            `).join('')}
                        </div>

                        <!-- Social Icons -->
                        <div class="flex gap-4 pt-4 slide-content-item delay-500">
                            ${member.social.map(platform => `
                                <a href="#" class="p-2 bg-black/5 dark:bg-white/5 rounded-full hover:bg-black/10 dark:hover:bg-white/20 hover:text-brand-primary dark:hover:text-brand-primary text-slate-600 dark:text-white transition-all duration-300 group" aria-label="${platform}">
                                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
        track.appendChild(slide);
      });
    }

    function renderPagination() {
      teamMembers.forEach((_, index) => {
        const dot = document.createElement("button");
        dot.className = `w-3 h-3 rounded-full transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-brand-primary ${index === 0 ? "bg-brand-primary w-8" : "bg-white/30 hover:bg-white/60"}`;
        dot.ariaLabel = `Go to slide ${index + 1}`;
        dot.onclick = () => goToSlide(index);
        paginationContainer.appendChild(dot);
      });
    }

    // Logic
    function updateSlideClasses() {
      const slides = document.querySelectorAll(".slide-item");
      slides.forEach((slide, index) => {
        if (index === currentIndex) {
          slide.classList.add("active-slide");
          slide.setAttribute("aria-hidden", "false");
        } else {
          slide.classList.remove("active-slide");
          slide.setAttribute("aria-hidden", "true");
        }
      });

      // Update Pagination
      Array.from(paginationContainer.children).forEach((dot, index) => {
        if (index === currentIndex) {
          dot.className =
            "w-8 h-3 rounded-full bg-brand-primary transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-brand-primary";
        } else {
          dot.className =
            "w-3 h-3 rounded-full bg-white/30 hover:bg-white/60 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-brand-primary";
        }
      });
    }

    // Scroll Progress Logic
    window.addEventListener("scroll", () => {
      const scrollProgress = document.getElementById("scroll-progress");
      if (scrollProgress) {
        const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = (window.pageYOffset / totalHeight) * 100;
        scrollProgress.style.width = `${progress}%`;
      }
    });

    function goToSlide(index) {
      if (index < 0) index = totalSlides - 1;
      if (index >= totalSlides) {
        document.getElementById('services').scrollIntoView({ behavior: 'smooth' });
        return;
      }

      currentIndex = index;
      const isRTL = document.documentElement.dir === 'rtl';
      const translateX = currentIndex * (isRTL ? 100 : -100);
      track.style.transform = `translateX(${translateX}%)`;

      // Trigger animations
      updateSlideClasses();
    }

    // Event Listeners
    prevBtn.addEventListener("click", () => {
      const isRTL = document.documentElement.dir === 'rtl';
      goToSlide(currentIndex + (isRTL ? 1 : -1));
    });
    nextBtn.addEventListener("click", () => {
      const isRTL = document.documentElement.dir === 'rtl';
      goToSlide(currentIndex + (isRTL ? -1 : 1));
    });

    // Keyboard Navigation
    document.addEventListener("keydown", (e) => {
      const isRTL = document.documentElement.dir === 'rtl';
      if (e.key === "ArrowLeft") goToSlide(currentIndex + (isRTL ? 1 : -1));
      if (e.key === "ArrowRight") goToSlide(currentIndex + (isRTL ? -1 : 1));
    });

    // Touch Navigation (Swipe)
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener(
      "touchstart",
      (e) => {
        touchStartX = e.changedTouches[0].screenX;
      },
      { passive: true },
    ); // passive for better performance

    document.addEventListener(
      "touchend",
      (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
      },
      { passive: true },
    );

    function handleSwipe() {
      const isRTL = document.documentElement.dir === 'rtl';
      const threshold = 50; // min swipe distance
      if (touchEndX < touchStartX - threshold) {
        // Swiped Left
        goToSlide(currentIndex + (isRTL ? -1 : 1));
      }
      if (touchEndX > touchStartX + threshold) {
        // Swiped Right
        goToSlide(currentIndex + (isRTL ? 1 : -1));
      }
    }

    // Inline Editing Data Handlers
    function updateMemberRole(memberIdx, newRole) {
      if (currentLang === 'ar') {
        teamMembers[memberIdx].roleAr = newRole.trim();
      } else {
        teamMembers[memberIdx].role = newRole.trim();
      }
      saveToStorage();
    }

    function updateMemberBio(memberIdx, newBio) {
      if (currentLang === 'ar') {
        teamMembers[memberIdx].bioAr = newBio.trim();
      } else {
        teamMembers[memberIdx].bio = newBio.trim();
      }
      saveToStorage();
    }

    function updateMemberSkill(memberIdx, skillIdx, newSkillText) {
      if (currentLang === 'ar') {
        teamMembers[memberIdx].skillsAr[skillIdx] = newSkillText.trim();
      } else {
        teamMembers[memberIdx].skills[skillIdx] = newSkillText.trim();
      }
      saveToStorage();
    }

    // Services Data and Logic
    const servicesData = [
      {
        title: "Web Development",
        titleAr: "تطوير الويب",
        desc: "Building highly responsive and scalable web applications using modern technologies.",
        descAr: "بناء تطبيقات ويب سريعة الاستجابة وقابلة للتطوير باستخدام تقنيات حديثة.",
        icon: `<svg class="w-8 h-8 md:w-10 md:h-10 text-brand-primary transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>`
      },
      {
        title: "UI/UX Design",
        titleAr: "تصميم واجهة وتجربة المستخدم",
        desc: "Crafting intuitive and immersive user experiences with a focus on human-centric design.",
        descAr: "صياغة تجارب مستخدم بديهية وغامرة مع التركيز على التصميم المتمحور حول الإنسان.",
        icon: `<svg class="w-8 h-8 md:w-10 md:h-10 text-brand-accent transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"></path></svg>`
      },
      {
        title: "Cloud Architecture",
        titleAr: "البنية التحتية السحابية",
        desc: "Designing robust and secure backend systems optimized for high availability in the cloud.",
        descAr: "تصميم أنظمة خلفية قوية وآمنة محسنة لتوافر الخدمة العالي في السحابة.",
        icon: `<svg class="w-8 h-8 md:w-10 md:h-10 text-emerald-500 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>`
      }
    ];

    function renderServices() {
      const grid = document.getElementById("services-grid");
      const title = document.getElementById("services-title");
      title.innerText = currentLang === 'ar' ? 'خدماتنا' : 'Our Services';
      grid.innerHTML = "";

      servicesData.forEach((service, index) => {
        const card = document.createElement("div");
        card.className = "flip-card w-full h-[320px] perspective-1000 group z-10";
        card.innerHTML = `
        card.innerHTML = `
                <div class="flip-card-inner relative w-full h-full shadow-xl rounded-2xl group-hover:shadow-brand-primary/20">
                    <!-- Front Side -->
                    <div class="flip-card-front absolute w-full h-full glass-panel p-8 rounded-2xl flex flex-col items-center justify-center overflow-hidden border border-white/10 group-hover:border-brand-primary/30 transition-colors">
                        <div class="${currentLang === 'ar' ? 'absolute top-0 left-0 w-32 h-32 bg-white/5 flex items-start justify-start p-4 drop-shadow-xl z-0 rounded-br-[100px]' : 'absolute top-0 right-0 w-32 h-32 bg-white/5 flex items-start justify-end p-4 drop-shadow-xl z-0 rounded-bl-[100px]'} transition-all duration-500 group-hover:bg-brand-primary/20 group-hover:scale-110">
                            ${service.icon}
                        </div>
                        <h3 class="relative z-10 text-3xl font-bold text-white text-center transition-colors cursor-text ${isEditMode ? 'hover:bg-white/10 p-2 rounded focus:outline-none focus:ring-1 focus:ring-brand-primary' : ''}"
                            ${isEditMode ? 'contenteditable="true"' : ''}
                            onblur="updateServiceTitle(${index}, this.innerText)">
                            ${currentLang === 'ar' ? service.titleAr : service.title}
                        </h3>
                        <div class="absolute bottom-6 w-full text-center text-brand-primary/60 text-sm font-medium animate-pulse flex items-center justify-center gap-2">
                            <span>${currentLang === 'ar' ? 'التفاصيل' : 'Details'}</span>
                            <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                        </div>
                    </div>
                    <!-- Back Side -->
                    <div class="flip-card-back absolute w-full h-full glass-panel p-8 rounded-2xl flex flex-col items-center justify-center text-center shadow-2xl border border-white/10">
                        <div class="w-12 h-1 mb-6 bg-brand-primary rounded-full"></div>
                        <p class="text-slate-300 text-lg leading-relaxed cursor-text ${isEditMode ? 'hover:bg-white/5 p-2 rounded focus:outline-none focus:ring-1 focus:ring-brand-primary' : ''}"
                           ${isEditMode ? 'contenteditable="true"' : ''}
                           onblur="updateServiceDesc(${index}, this.innerText)">
                            ${currentLang === 'ar' ? service.descAr : service.desc}
                        </p>
                    </div>
                </div>
            `;
        grid.appendChild(card);
      });
    }

    function updateServiceTitle(index, text) {
      if (currentLang === 'ar') servicesData[index].titleAr = text.trim();
      else servicesData[index].title = text.trim();
      saveToStorage();
    }

    function updateServiceDesc(index, text) {
      if (currentLang === 'ar') servicesData[index].descAr = text.trim();
      else servicesData[index].desc = text.trim();
      saveToStorage();
    }

    // Initialize
    renderWelcome();
    renderSlides();
    renderPagination();
    renderServices();
    // Slight delay to trigger initial animation nicely
    setTimeout(() => updateSlideClasses(), 50);
  </script>
</body>

</html>
