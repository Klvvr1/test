  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Outfit", "sans-serif"],
            cairo: ["Cairo", "sans-serif"],
          },
          colors: {
            brand: {
              dark: "#0f172a", // Slate 900
              primary: "#3b82f6", // Blue 500
              accent: "#8b5cf6", // Violet 500
            },
          },
          transitionTimingFunction: {
            "out-expo": "cubic-bezier(0.19, 1, 0.22, 1)",
          },
        },
      },
    };

  <style>
    /* Custom Styles for Utilities not in Tailwind by default */
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Flip Card Animation */
    .perspective-1000 {
      perspective: 1000px;
    }

    .flip-card-inner {
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flip-card:hover .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    .flip-card-back {
      transform: rotateY(180deg);
    }

    /* Hide scrollbar for clean UI */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Staggered Animation Logic */
    .slide-content-item {
      opacity: 0;
      transform: translateY(20px);
      transition:
        opacity 0.6s ease-out,
        transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .active-slide .slide-content-item {
      opacity: 1;
      transform: translateY(0);
    }

    /* Stagger Delays */
    .active-slide .delay-100 {
      transition-delay: 100ms;
    }

    .active-slide .delay-200 {
      transition-delay: 200ms;
    }

    .active-slide .delay-300 {
      transition-delay: 300ms;
    }

    .active-slide .delay-400 {
      transition-delay: 400ms;
    }

    .active-slide .delay-500 {
      transition-delay: 500ms;
    }

    /* Navigation Button Hover Effect */
    .nav-btn:hover .arrow-icon {
      transform: scale(1.2);
    }

    /* Floating Glow Animation */
    @keyframes floating {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(2%, 5%) scale(1.05); }
      66% { transform: translate(-3%, -2%) scale(0.95); }
    }

    .animate-float {
      animation: floating 8s ease-in-out infinite;
    }

    /* Scroll Progress Bar */
    #scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 4px;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      z-index: 100;
      transition: width 0.1s ease-out;
    }
  </style>
</head>

    var isEditMode = false;
    var totalSlides = 0;

    // --- Core Functions ---
    function saveToStorage() {
        try {
            const data = {
                teamMembers,
                welcomeData,
                servicesData,
                currentLang,
                isEditMode,
                currentIndex
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch (e) {
            console.error("Save failed:", e);
        }
    }

    function loadFromStorage() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                // Intentionally skipping data.teamMembers to force local defaults (fixes image loading)
                if (data.welcomeData) Object.assign(welcomeData, data.welcomeData);
                if (data.servicesData) servicesData = data.servicesData;
                if (data.currentLang) currentLang = data.currentLang;
                if (typeof data.isEditMode !== 'undefined') isEditMode = data.isEditMode;
                if (typeof data.currentIndex !== 'undefined') currentIndex = data.currentIndex;
                console.log("Data loaded successfully.");
            } catch (e) {
                console.error("Load failed:", e);
            }
        }
    }

    // --- Rendering ---
    function renderWelcome() {
        const welcomeContainer = document.getElementById("welcome-content");
        if (!welcomeContainer) return;
        const isRTL = currentLang === 'ar';
        const titleText = isRTL ? welcomeData.titleAr : welcomeData.title;
        const descText = isRTL ? welcomeData.descAr : welcomeData.desc;
        const btnText = isRTL ? welcomeData.btnAr : welcomeData.btn;

        welcomeContainer.innerHTML = `
            <h1 class="text-5xl md:text-7xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-primary to-brand-accent drop-shadow-sm"
                ${isEditMode ? 'contenteditable="true" onblur="updateWelcomeTitle(this.innerText)" class="cursor-text hover:bg-white/5 p-2 rounded"' : ''}>
                ${titleText}
            </h1>
            <p class="text-xl md:text-2xl text-slate-600 dark:text-slate-300 leading-relaxed max-w-2xl mx-auto"
                ${isEditMode ? 'contenteditable="true" onblur="updateWelcomeDesc(this.innerText)" class="cursor-text hover:bg-white/5 p-2 rounded"' : ''}>
                ${descText}
            </p>
            <div class="pt-8">
                <button onclick="if(!isEditMode) document.getElementById('portfolio').scrollIntoView({ behavior: 'smooth' });" class="px-8 py-4 bg-brand-primary hover:bg-brand-primary/90 text-white rounded-full font-bold text-lg shadow-lg hover:shadow-brand-primary/50 transition-all flex items-center gap-3 mx-auto">
                    <span ${isEditMode ? 'contenteditable="true" onblur="updateWelcomeBtn(this.innerText)" class="cursor-text"' : ''}>${btnText}</span>
                    <svg class="w-5 h-5 ${!isEditMode ? 'animate-bounce' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                </button>
            </div>
        `;
    }

    function renderSlides() {
        const track = document.getElementById("carousel-track");
        if (!track) return;
        track.innerHTML = "";
        teamMembers.forEach((member, index) => {
            const slide = document.createElement("article");
            slide.className = `min-w-full h-full flex flex-col md:flex-row items-center justify-center p-6 md:p-20 gap-8 md:gap-16 slide-item`;
            const name = currentLang === 'ar' ? member.nameAr : member.name;
            const role = currentLang === 'ar' ? member.roleAr : member.role;
            const bio = currentLang === 'ar' ? member.bioAr : member.bio;
            const skills = currentLang === 'ar' ? member.skillsAr : member.skills;
            const isRTL = currentLang === 'ar';

            slide.innerHTML = `
                <div class="relative w-56 h-72 md:w-72 md:h-96 shrink-0 flex items-end justify-center group slide-content-item">
                    <div class="absolute bottom-0 w-full aspect-square bg-brand-primary/20 rounded-full blur-3xl opacity-50"></div>
                    <img src="${member.image}" alt="${name}" class="relative z-10 w-full h-[120%] object-cover object-top rounded-b-full drop-shadow-xl">
                    <div class="absolute bottom-4 ${isRTL ? 'left-4' : 'right-4'} z-20 bg-white/80 dark:bg-white/10 backdrop-blur-md p-2 rounded-xl text-xs font-mono font-bold text-brand-primary">
                        ${index + 1} / ${totalSlides}
                    </div>
                </div>
                <div class="flex flex-col items-center md:items-start text-center ${isRTL ? 'md:text-right' : 'md:text-left'} max-w-2xl space-y-6">
                    <span class="inline-block px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-sm font-semibold uppercase text-brand-primary"
                          ${isEditMode ? 'contenteditable="true" onblur="updateMemberRole('+index+', this.innerText)" class="cursor-text"' : ''}>
                        ${role}
                    </span>
                    <h1 class="text-4xl md:text-6xl font-bold text-white">${name}</h1>
                    <p class="text-lg text-slate-400 leading-relaxed"
                       ${isEditMode ? 'contenteditable="true" onblur="updateMemberBio('+index+', this.innerText)" class="cursor-text"' : ''}>
                        ${bio}
                    </p>
                    <div class="flex flex-wrap justify-center md:justify-start gap-2">
                        ${skills.map((s, si) => `<span class="px-3 py-1 bg-white/5 rounded-lg text-sm border border-white/10 hover:text-brand-primary transition-colors" ${isEditMode ? 'contenteditable="true" onblur="updateMemberSkill('+index+','+si+', this.innerText)" class="cursor-text"' : ''}>${s}</span>`).join('')}
                    </div>
                </div>
            `;
            track.appendChild(slide);
        });
    }

    function renderPagination() {
        const container = document.getElementById("pagination");
        if (!container) return;
        container.innerHTML = "";
        teamMembers.forEach((_, index) => {
            const dot = document.createElement("button");
            dot.className = `w-3 h-3 rounded-full transition-all duration-300 ${index === currentIndex ? "bg-brand-primary w-8" : "bg-white/30 hover:bg-white/60"}`;
            dot.onclick = () => goToSlide(index);
            container.appendChild(dot);
        });
    }

    function renderServices() {
        const grid = document.getElementById("services-grid");
        const title = document.getElementById("services-title");
        if (!grid || !title) return;
        title.innerText = currentLang === 'ar' ? 'خدماتنا' : 'Our Services';
        grid.innerHTML = "";
        servicesData.forEach((service, index) => {
            const card = document.createElement("div");
            card.className = "flip-card w-full h-[320px] perspective-1000 group z-10";
            card.innerHTML = `
                <div class="flip-card-inner relative w-full h-full shadow-xl rounded-2xl group-hover:shadow-brand-primary/20">
                    <div class="flip-card-front absolute w-full h-full glass-panel p-8 rounded-2xl flex flex-col items-center justify-center overflow-hidden border border-white/10 group-hover:border-brand-primary/30 transition-colors">
                        <div class="absolute top-0 ${currentLang==='ar'?'left-0 rounded-br-[100px]':'right-0 rounded-bl-[100px]'} w-32 h-32 bg-white/5 flex items-start justify-center p-4 transition-all group-hover:bg-brand-primary/20 group-hover:scale-110">
                            ${service.icon}
                        </div>
                        <h3 class="relative z-10 text-3xl font-bold text-white text-center"
                            ${isEditMode ? 'contenteditable="true" onblur="updateServiceTitle('+index+', this.innerText)" class="cursor-text hover:bg-white/10 p-2 rounded"' : ''}>
                            ${currentLang === 'ar' ? service.titleAr : service.title}
                        </h3>
                    </div>
                    <div class="flip-card-back absolute w-full h-full glass-panel p-8 rounded-2xl flex flex-col items-center justify-center text-center shadow-2xl border border-white/10">
                        <div class="w-12 h-1 mb-6 bg-brand-primary rounded-full"></div>
                        <p class="text-slate-300 text-lg leading-relaxed"
                           ${isEditMode ? 'contenteditable="true" onblur="updateServiceDesc('+index+', this.innerText)" class="cursor-text"' : ''}>
                            ${currentLang === 'ar' ? service.descAr : service.desc}
                        </p>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // --- Controls ---
    function goToSlide(index) {
        if (index < 0) index = totalSlides - 1;
        if (index >= totalSlides) {
            document.getElementById('services').scrollIntoView({ behavior: 'smooth' });
            return;
        }
        currentIndex = index;
        const track = document.getElementById("carousel-track");
        const isRTL = document.documentElement.dir === 'rtl';
        track.style.transform = `translateX(${currentIndex * (isRTL ? 100 : -100)}%)`;
        updateUI();
    }

    function updateUI() {
        const slides = document.querySelectorAll(".slide-item");
        slides.forEach((slide, idx) => {
            if (idx === currentIndex) slide.classList.add("active-slide");
            else slide.classList.remove("active-slide");
        });
        renderPagination();
    }

    function renderAll() {
        renderWelcome();
        renderSlides();
        renderPagination();
        renderServices();
        goToSlide(currentIndex);
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        syncLayout();
        renderAll();
        saveToStorage();
    }

    function syncLayout() {
        document.documentElement.lang = currentLang;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        const lb = document.getElementById("lang-btn");
        const et = document.getElementById('edit-mode-text');
        if (currentLang === 'ar') {
            document.body.classList.remove('font-sans');
            document.body.classList.add('font-cairo');
            lb.innerText = "English";
            et.innerText = isEditMode ? 'إيقاف التعديل' : 'تعديل';
        } else {
            document.body.classList.add('font-sans');
            document.body.classList.remove('font-cairo');
            lb.innerText = "العربية";
            et.innerText = isEditMode ? 'Stop Edit' : 'Edit';
        }
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        syncLayout();
        renderAll();
        saveToStorage();
    }

    // --- Update Handlers (Minimalist) ---
    function updateWelcomeTitle(t) { if(currentLang==='ar') welcomeData.titleAr=t; else welcomeData.title=t; saveToStorage(); }
    function updateWelcomeDesc(t) { if(currentLang==='ar') welcomeData.descAr=t; else welcomeData.desc=t; saveToStorage(); }
    function updateWelcomeBtn(t) { if(currentLang==='ar') welcomeData.btnAr=t; else welcomeData.btn=t; saveToStorage(); }
    function updateMemberRole(i,t) { if(currentLang==='ar') teamMembers[i].roleAr=t; else teamMembers[i].role=t; saveToStorage(); }
    function updateMemberBio(i,t) { if(currentLang==='ar') teamMembers[i].bioAr=t; else teamMembers[i].bio=t; saveToStorage(); }
    function updateMemberSkill(i,si,t) { if(currentLang==='ar') teamMembers[i].skillsAr[si]=t; else teamMembers[i].skills[si]=t; saveToStorage(); }
    function updateServiceTitle(i,t) { if(currentLang==='ar') servicesData[i].titleAr=t; else servicesData[i].title=t; saveToStorage(); }
    function updateServiceDesc(i,t) { if(currentLang==='ar') servicesData[i].descAr=t; else servicesData[i].desc=t; saveToStorage(); }

    // --- Initialization ---
    function init() {
        console.log("DOM Ready, starting init...");
        setDefaults();
        loadFromStorage();
        totalSlides = teamMembers.length;
        syncLayout();
        renderAll();

        // Bind Buttons
        document.getElementById("prev-btn").onclick = () => { const isRTL = document.documentElement.dir === 'rtl'; goToSlide(currentIndex + (isRTL ? 1 : -1)); };
        document.getElementById("next-btn").onclick = () => { const isRTL = document.documentElement.dir === 'rtl'; goToSlide(currentIndex + (isRTL ? -1 : 1)); };
        
        window.addEventListener("scroll", () => {
            const bar = document.getElementById("scroll-progress");
            if (bar) {
                const h = document.documentElement.scrollHeight - window.innerHeight;
                bar.style.width = `${(window.pageYOffset / h) * 100}%`;
            }
        });
        console.log("Init complete.");
    }

    // Wait for everything
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
  </script>
</body>

</html>
