<!doctype html>
<html lang="en" class="scroll-smooth dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Portfolio | Modern & Responsive</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ["Outfit", "sans-serif"],
              cairo: ["Cairo", "sans-serif"],
            },
            colors: {
              brand: {
                dark: "#0f172a", // Slate 900
                light: "#f8fafc", // Slate 50
                primary: "#3b82f6", // Blue 500
                accent: "#8b5cf6", // Violet 500
              },
            },
            transitionTimingFunction: {
              "out-expo": "cubic-bezier(0.19, 1, 0.22, 1)",
            },
          },
        },
      };
    </script>
    <style>
      /* Custom Styles for Utilities not in Tailwind by default */
      .glass-panel {
        background: rgba(0, 0, 0, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }
      .dark .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Hide scrollbar for clean UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Staggered Animation Logic */
      .slide-content-item {
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.6s ease-out,
          transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .active-slide .slide-content-item {
        opacity: 1;
        transform: translateY(0);
      }

      /* Stagger Delays */
      .active-slide .delay-100 {
        transition-delay: 100ms;
      }
      .active-slide .delay-200 {
        transition-delay: 200ms;
      }
      .active-slide .delay-300 {
        transition-delay: 300ms;
      }
      .active-slide .delay-400 {
        transition-delay: 400ms;
      }
      .active-slide .delay-500 {
        transition-delay: 500ms;
      }

      /* Navigation Button Hover Effect */
      .nav-btn:hover .arrow-icon {
        transform: scale(1.2);
      }
    </style>
  </head>
  <body
    class="bg-brand-light dark:bg-brand-dark text-slate-900 dark:text-white font-sans overflow-hidden antialiased selection:bg-brand-primary selection:text-white transition-colors duration-500"
  >
    <!-- Main Container -->
    <main
      class="relative h-screen w-full flex items-center justify-center overflow-hidden"
      role="main"
      aria-label="Team Portfolio Carousel"
    >
      <div class="absolute top-6 right-6 z-50 flex gap-3">
        <!-- Theme Toggle Button -->
        <button id="theme-btn" onclick="toggleTheme()" class="px-3 py-2 bg-black/5 dark:bg-white/10 backdrop-blur-md border border-black/10 dark:border-white/20 rounded-full text-slate-800 dark:text-white hover:bg-black/10 dark:hover:bg-white/20 transition-all shadow-lg flex items-center justify-center">
          <!-- Sun Icon -->
          <svg id="theme-icon-light" class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <!-- Moon Icon -->
          <svg id="theme-icon-dark" class="w-5 h-5 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>
        <!-- Language Toggle Button -->
        <button id="lang-btn" onclick="toggleLanguage()" class="px-5 py-2 bg-black/5 dark:bg-white/10 backdrop-blur-md border border-black/10 dark:border-white/20 rounded-full text-sm font-bold text-slate-800 dark:text-white hover:bg-black/10 dark:hover:bg-white/20 transition-all font-cairo shadow-lg">
          العربية
        </button>
      </div>
      <!-- Background Elements (Decorative) -->
      <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <div
          class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-brand-primary/20 rounded-full blur-[120px] mix-blend-screen animate-pulse"
        ></div>
        <div
          class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-brand-accent/20 rounded-full blur-[120px] mix-blend-screen animate-pulse"
          style="animation-duration: 4s"
        ></div>
      </div>

      <!-- Carousel Track -->
      <div
        id="carousel-track"
        class="flex w-full h-full transition-transform duration-700 ease-in-out will-change-transform z-10"
        aria-live="polite"
      >
        <!-- Slides will be injected here by JS -->
      </div>

      <!-- Navigation Controls -->
      <button
        id="prev-btn"
        class="nav-btn absolute left-4 md:left-8 top-1/2 -translate-y-1/2 z-20 p-4 rounded-full glass-panel hover:bg-black/5 dark:hover:bg-white/10 transition-all duration-300 group focus:outline-none focus:ring-2 focus:ring-brand-primary"
        aria-label="Previous Slide"
      >
        <svg
          class="arrow-icon w-6 h-6 md:w-8 md:h-8 text-slate-800 dark:text-white transition-transform duration-300"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          ></path>
        </svg>
      </button>

      <button
        id="next-btn"
        class="nav-btn absolute right-4 md:right-8 top-1/2 -translate-y-1/2 z-20 p-4 rounded-full glass-panel hover:bg-black/5 dark:hover:bg-white/10 transition-all duration-300 group focus:outline-none focus:ring-2 focus:ring-brand-primary"
        aria-label="Next Slide"
      >
        <svg
          class="arrow-icon w-6 h-6 md:w-8 md:h-8 text-slate-800 dark:text-white transition-transform duration-300"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 5l7 7-7 7"
          ></path>
        </svg>
      </button>

      <!-- Pagination Indicators -->
      <div
        id="pagination"
        class="absolute bottom-8 left-1/2 -translate-x-1/2 flex space-x-3 z-20"
      >
        <!-- Dots injected by JS -->
      </div>
    </main>

    <!-- JavaScript Logic -->
    <script>
      // Team Data
      // Team Data (Simulated DB)
      const teamMembers = [
        {
          name: "Mohammed Hashim",
          nameAr: "محمد هاشم",
          role: "Team Leader",
          roleAr: "قائد الفريق",
          bio: "Visionary leader with a passion for innovative solutions and team synergy. Expert in strategic planning and full-stack architecture.",
          bioAr: "قائد صاحب رؤية شغوف بالحلول المبتكرة وتآزر الفريق. خبير في التخطيط الاستراتيجي وهندسة البرمجيات المتكاملة.",
          skills: ["Leadership", "Project Management", "System Architecture", "React/Node"],
          skillsAr: ["القيادة", "إدارة المشاريع", "هندسة الأنظمة", "React/Node"],
          social: ["twitter", "linkedin", "github"],
          image: "./Team_Images/Leader_Image-removebg-preview.png",
        },
        {
          name: "Ahmed Albtati",
          nameAr: "أحمد البطاطي",
          role: "Team Member",
          roleAr: "عضو الفريق",
          bio: "Creative frontend developer focused on crafting immersive user experiences. Specialist in responsive design and accessibility.",
          bioAr: "مطور واجهات أمامية مبدع يركز على صياغة تجارب مستخدم غامرة. متخصص في التصميم المتجاوب وإمكانية الوصول.",
          skills: ["Frontend Dev", "UI/UX Design", "Three.js", "Accessibility"],
          skillsAr: ["تطوير الواجهات", "تصميم UI/UX", "Three.js", "إمكانية الوصول"],
          social: ["linkedin", "dribbble"],
          image: "https://ui-avatars.com/api/?name=Ahmed+Albtati&background=8b5cf6&color=fff&size=512&font-size=0.33",
        },
        {
          name: "Khaled Bin Mahfouz",
          nameAr: "خالد بن محفوظ",
          role: "Team Member",
          roleAr: "عضو الفريق",
          bio: "Detail-oriented backend engineer ensuring robust and scalable server-side operations. Loves database optimization and cloud infrastructure.",
          bioAr: "مهندس واجهات خلفية دقيق يضمن عمليات خادم قوية وقابلة للتطوير. محب لتحسين قواعد البيانات والبنية التحتية السحابية.",
          skills: ["Backend Dev", "Database Design", "AWS", "Python"],
          skillsAr: ["تطوير الخلفية", "تصميم قواعد البيانات", "AWS", "Python"],
          social: ["github", "linkedin"],
          image: "https://ui-avatars.com/api/?name=Khaled+Bin+Mahfouz&background=10b981&color=fff&size=512&font-size=0.33",
        },
        {
          name: "Khallad Ghanem",
          nameAr: "خلاد غانم",
          role: "Team Member",
          roleAr: "عضو الفريق",
          bio: "Full-stack developer with a knack for solving complex algorithmic problems. Drives the technical core of our applications.",
          bioAr: "مطور شامل لديه موهبة في حل المشكلات الخوارزمية المعقدة. يقود النواة التقنية لتطبيقاتنا.",
          skills: ["Full Stack", "Algorithms", "DevOps", "Java"],
          skillsAr: ["تطوير شامل", "الخوارزميات", "DevOps", "Java"],
          social: ["github", "twitter"],
          image: "https://ui-avatars.com/api/?name=Khallad+Ghanem&background=f59e0b&color=fff&size=512&font-size=0.33",
        },
      ];

      // State & Config
      let currentIndex = 0;
      let currentLang = 'en';
      const totalSlides = teamMembers.length;

      // Initialize Theme
      if (localStorage.getItem('theme') === 'light' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches)) {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }

      // Toggle Theme
      function toggleTheme() {
        if (document.documentElement.classList.contains('dark')) {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        } else {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        }
      }

      // DOM Elements
      const track = document.getElementById("carousel-track");
      const paginationContainer = document.getElementById("pagination");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const langBtn = document.getElementById("lang-btn");

      // Toggle Language
      function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        
        // Update Document Attributes
        document.documentElement.lang = currentLang;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

        // Update Font
        if (currentLang === 'ar') {
            document.body.classList.remove('font-sans');
            document.body.classList.add('font-cairo');
            langBtn.innerText = "English";
        } else {
            document.body.classList.add('font-sans');
            document.body.classList.remove('font-cairo');
            langBtn.innerText = "العربية";
        }

        // Re-render content
        renderSlides();
        
        // Restore active state
        updateSlideClasses();
      }

      // Render Slides
      function renderSlides() {
        track.innerHTML = ""; // Clear existing
        teamMembers.forEach((member, index) => {
          const slide = document.createElement("article");
          slide.className = `min-w-full h-full flex flex-col md:flex-row items-center justify-center p-6 md:p-20 gap-8 md:gap-16 opacity-100 transition-opacity duration-300 slide-item`;
          slide.setAttribute("aria-hidden", index !== 0);
          slide.dataset.index = index;

          // Localized Data
          const name = currentLang === 'ar' ? member.nameAr : member.name;
          const role = currentLang === 'ar' ? member.roleAr : member.role;
          const bio = currentLang === 'ar' ? member.bioAr : member.bio;
          const skills = currentLang === 'ar' ? member.skillsAr : member.skills;
          const isRTL = currentLang === 'ar';

          // For layout: In RTL mode, flex-row (no reverse) puts first child on Right.
          // [Image, Text] -> Image Right, Text Left.
          // This is usually correct.
          // Text Alignment: need md:text-right or md:text-start. 
          // Item alignment: md:items-start in Flex follows direction (Right in RTL).
          
          slide.innerHTML = `
                    <!-- Pop-out Image Section -->
                    <div class="relative w-56 h-72 md:w-72 md:h-96 shrink-0 flex items-end justify-center slide-content-item delay-100 group">
                        
                        <!-- Glow -->
                        <div class="absolute bottom-0 w-full aspect-square bg-brand-primary/30 rounded-full blur-3xl opacity-50 animate-pulse"></div>
                        
                        <!-- Circle Background -->
                        <div class="absolute bottom-0 w-full aspect-square rounded-full border-4 border-slate-200 dark:border-white/10 bg-gradient-to-b from-slate-100 to-slate-200 dark:from-slate-700 dark:to-slate-900 shadow-xl dark:shadow-2xl group-hover:scale-105 transition-transform duration-500 ease-out"></div>

                        <!-- Image -->
                        <img 
                            src="${member.image}" 
                            alt="${name}" 
                            class="relative z-10 w-full h-[120%] object-cover object-top rounded-b-full drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] group-hover:scale-105 transition-transform duration-500 ease-out origin-bottom"
                        >
                        
                        <!-- Badge/Counter -->
                        <div class="absolute bottom-4 ${isRTL ? 'left-4' : 'right-4'} z-20 bg-white/80 dark:bg-white/10 backdrop-blur-md border border-white/40 dark:border-white/20 p-2 rounded-xl text-xs font-mono text-brand-primary font-bold shadow-sm dark:shadow-none">
                            ${index + 1} / ${totalSlides}
                        </div>
                    </div>

                    <!-- Text Section -->
                    <div class="flex flex-col items-center md:items-start text-center ${isRTL ? 'md:text-right' : 'md:text-left'} max-w-2xl space-y-6">
                        
                        <!-- Role Badge -->
                        <span class="inline-block px-4 py-1.5 rounded-full bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-sm font-semibold tracking-wide uppercase text-brand-primary slide-content-item delay-200">
                            ${role}
                        </span>

                        <!-- Name -->
                        <h1 class="text-4xl md:text-6xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-700 dark:from-white dark:to-white/60 slide-content-item delay-300">
                            ${name}
                        </h1>

                        <!-- Bio -->
                        <p class="text-lg text-slate-600 dark:text-slate-400 leading-relaxed slide-content-item delay-400">
                            ${bio}
                        </p>

                        <!-- Skills -->
                        <div class="flex flex-wrap justify-center ${isRTL ? 'md:justify-start' : 'md:justify-start'} gap-2 slide-content-item delay-500">
                            ${skills.map(skill => `
                                <span class="px-3 py-1 bg-slate-100 dark:bg-slate-800/50 rounded-lg text-sm text-slate-700 dark:text-slate-300 hover:bg-brand-primary/10 dark:hover:bg-brand-primary/20 hover:text-brand-primary dark:hover:text-brand-primary transition-colors cursor-default border border-slate-200 dark:border-slate-700/50">
                                    ${skill}
                                </span>
                            `).join('')}
                        </div>

                        <!-- Social Icons -->
                        <div class="flex gap-4 pt-4 slide-content-item delay-500">
                            ${member.social.map(platform => `
                                <a href="#" class="p-2 bg-black/5 dark:bg-white/5 rounded-full hover:bg-black/10 dark:hover:bg-white/20 hover:text-brand-primary dark:hover:text-brand-primary text-slate-600 dark:text-white transition-all duration-300 group" aria-label="${platform}">
                                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
          track.appendChild(slide);
        });
      }

      function renderPagination() {
        teamMembers.forEach((_, index) => {
          const dot = document.createElement("button");
          dot.className = `w-3 h-3 rounded-full transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-brand-primary ${index === 0 ? "bg-brand-primary w-8" : "bg-black/20 dark:bg-white/30 hover:bg-black/40 dark:hover:bg-white/60"}`;
          dot.ariaLabel = `Go to slide ${index + 1}`;
          dot.onclick = () => goToSlide(index);
          paginationContainer.appendChild(dot);
        });
      }

      // Logic
      function updateSlideClasses() {
        const slides = document.querySelectorAll(".slide-item");
        slides.forEach((slide, index) => {
          if (index === currentIndex) {
            slide.classList.add("active-slide");
            slide.setAttribute("aria-hidden", "false");
          } else {
            slide.classList.remove("active-slide");
            slide.setAttribute("aria-hidden", "true");
          }
        });

        // Update Pagination
        Array.from(paginationContainer.children).forEach((dot, index) => {
          if (index === currentIndex) {
            dot.className =
              "w-8 h-3 rounded-full bg-brand-primary transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-brand-primary";
          } else {
            dot.className =
              "w-3 h-3 rounded-full bg-black/20 dark:bg-white/30 hover:bg-black/40 dark:hover:bg-white/60 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-brand-primary";
          }
        });
      }

      function goToSlide(index) {
        if (index < 0) index = totalSlides - 1;
        if (index >= totalSlides) index = 0;

        currentIndex = index;
        const translateX = currentIndex * -100;
        track.style.transform = `translateX(${translateX}%)`;

        // Trigger animations
        updateSlideClasses();
      }

      // Event Listeners
      prevBtn.addEventListener("click", () => goToSlide(currentIndex - 1));
      nextBtn.addEventListener("click", () => goToSlide(currentIndex + 1));

      // Keyboard Navigation
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") goToSlide(currentIndex - 1);
        if (e.key === "ArrowRight") goToSlide(currentIndex + 1);
      });

      // Touch Navigation (Swipe)
      let touchStartX = 0;
      let touchEndX = 0;

      document.addEventListener(
        "touchstart",
        (e) => {
          touchStartX = e.changedTouches[0].screenX;
        },
        { passive: true },
      ); // passive for better performance

      document.addEventListener(
        "touchend",
        (e) => {
          touchEndX = e.changedTouches[0].screenX;
          handleSwipe();
        },
        { passive: true },
      );

      function handleSwipe() {
        const threshold = 50; // min swipe distance
        if (touchEndX < touchStartX - threshold) {
          // Swiped Left -> Next
          goToSlide(currentIndex + 1);
        }
        if (touchEndX > touchStartX + threshold) {
          // Swiped Right -> Prev
          goToSlide(currentIndex - 1);
        }
      }

      // Initialize
      renderSlides();
      renderPagination();
      // Slight delay to trigger initial animation nicely
      setTimeout(() => updateSlideClasses(), 50);
    </script>
  </body>
</html>
